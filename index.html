<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет инструментов | ToolTracker</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .app {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: #ffffff;
            position: relative;
            overflow-x: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .screen {
            display: none;
            padding: 16px;
            padding-bottom: 100px;
        }
        .screen.active {
            display: block;
        }
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            text-align: center;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: white;
        }
        .login-logo {
            font-size: 80px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }
        .login-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 48px;
        }
        .btn {
            width: 100%;
            max-width: 300px;
            padding: 16px 24px;
            background: #2AABEE;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: block;
            margin: 0 auto 8px;
        }
        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        .btn-outline {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .dev-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 300px;
        }
        .dev-title {
            font-size: 12px;
            opacity: 0.5;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 20px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 12px;
            opacity: 0.7;
        }
        .tabs {
            display: flex;
            gap: 4px;
            padding: 16px 16px 0;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            background: #f1f5f9;
            border: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            color: #94a3b8;
        }
        .tab.active {
            background: #fff;
            color: #2AABEE;
            box-shadow: 0 -2px 0 #2AABEE;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #065f46;
        }
        .toast.error {
            background: #991b1b;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- ЭКРАН ВХОДА -->
        <div class="login-screen" id="loginScreen">
            <div class="login-logo">🔧</div>
            <div class="login-title">ToolTracker</div>
            <div class="login-subtitle">Учет инструментов на предприятии</div>
            
            <button class="btn" id="btnLoginTelegram">✈️ Войти через Telegram</button>
            
            <div class="dev-section">
                <div class="dev-title">Режим разработчика</div>
                <button class="btn btn-outline" id="btnDevUser">👤 Сотрудник</button>
                <button class="btn btn-outline" id="btnDevBrigadier">👷 Бригадир</button>
                <button class="btn btn-outline" id="btnDevAdmin">🛡️ Админ</button>
            </div>
        </div>

        <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
        <div class="screen" id="mainScreen" style="flex-direction:column;">
            <div class="header">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <h1>🔧 Учет инструментов</h1>
                        <div class="subtitle">Сканируйте QR-код</div>
                    </div>
                    <button class="btn" style="width:auto;padding:8px 16px;font-size:13px;background:rgba(255,255,255,0.1);margin:0;" id="btnLogout">🚪 Выйти</button>
                </div>
                <div style="margin-top:12px;display:flex;align-items:center;gap:8px;">
                    <div style="width:28px;height:28px;border-radius:50%;background:#2AABEE;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;" id="userAvatar">?</div>
                    <span id="userName">Пользователь</span>
                    <span id="userRole" style="font-size:10px;padding:3px 8px;border-radius:10px;display:none;"></span>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="scan">📷 Сканер</button>
                <button class="tab" data-tab="history">📋 История</button>
                <button class="tab" data-tab="admin" id="tabAdmin" style="display:none;">⚙️ Админ</button>
            </div>

            <div id="screen-scan" class="screen active">
                <div style="text-align:center;padding:20px;">
                    <input type="text" id="manualInput" placeholder="Введите серийный номер" style="width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:16px;font-size:16px;text-align:center;font-family:monospace;margin-bottom:8px;">
                    <button class="btn" style="background:#f1f5f9;color:#1e293b;" id="btnSearch">🔍 Найти инструмент</button>
                    <p style="font-size:11px;color:#94a3b8;margin-top:8px;">
                        Демо: SN-775533, SN-992211, SN-448899, SN-112266
                    </p>
                </div>
                <div id="toolCard" style="display:none;background:#f8fafc;border-radius:16px;padding:20px;text-align:center;">
                    <div style="font-size:20px;font-weight:700;margin-bottom:4px;" id="toolName"></div>
                    <div style="font-size:13px;color:#64748b;background:rgba(0,0,0,0.04);display:inline-block;padding:5px 12px;border-radius:12px;margin-bottom:12px;font-family:monospace;" id="toolSerial"></div>
                    <div id="statusBadge" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;font-weight:600;font-size:14px;margin-bottom:16px;"></div>
                    <button class="btn" style="display:none;margin-bottom:8px;" id="btnTake">🤚 Взять</button>
                    <button class="btn" style="display:none;margin-bottom:8px;background:#10b981;" id="btnReturn">✅ Вернуть</button>
                    <button class="btn" style="display:none;background:#ef4444;font-size:13px;padding:10px;" id="btnForceReturn">⚡ Принудительный возврат</button>
                </div>
            </div>

            <div id="screen-history" class="screen">
                <h3>📋 История операций</h3>
                <div id="historyList"></div>
            </div>

            <div id="screen-admin" class="screen">
                <h3>⚙️ Панель администратора</h3>
                <div id="adminContent"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        (function() {
            // База данных
            const STORAGE_KEY = 'tooltracker_db_v7';
            const AUTH_KEY = 'tooltracker_auth_v4';

            function getDefaultData() {
                return {
                    users: [
                        { telegram_id: 987654321, username: 'admin_user', full_name: 'Сергей Админов', role: 'admin' },
                        { telegram_id: 111222333, username: 'brigadier_user', full_name: 'Алексей Бригадиров', role: 'brigadier' },
                        { telegram_id: 123456789, username: 'ivan_petrov', full_name: 'Иван Петров', role: 'user' },
                    ],
                    categories: [
                        { id: 'cat_1', name: 'Электроинструменты' },
                        { id: 'cat_2', name: 'Измерительные приборы' },
                    ],
                    tools: [
                        { serial: 'SN-775533', name: 'Перфоратор Bosch GBH 2-28', category_id: 'cat_1', status: 'available', current_holder: null },
                        { serial: 'SN-992211', name: 'Шуруповерт Makita DF333', category_id: 'cat_1', status: 'available', current_holder: null },
                        { serial: 'SN-448899', name: 'УШМ DeWALT 125мм', category_id: 'cat_1', status: 'available', current_holder: null },
                        { serial: 'SN-112266', name: 'Лазерный нивелир Bosch', category_id: 'cat_2', status: 'taken', current_holder: 123456789 },
                    ],
                    transactions: [
                        { id: 1, tool_serial: 'SN-112266', user_id: 123456789, action: 'take', timestamp: new Date(Date.now() - 3600000).toISOString() },
                    ]
                };
            }

            function loadData() {
                const s = localStorage.getItem(STORAGE_KEY);
                if (s) { try { const d = JSON.parse(s); if (d.categories) return d; } catch (e) {} }
                const def = getDefaultData();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(def));
                return def;
            }

            function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
            let DB = loadData();
            let currentUser = null;
            let currentScannedTool = null;

            // DOM элементы
            const $ = (s) => document.querySelector(s);
            const $$ = (s) => document.querySelectorAll(s);
            const loginScreen = $('#loginScreen');
            const mainScreen = $('#mainScreen');
            const toast = $('#toast');
            let toastTimer = null;

            function showToast(msg, type = '') {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // ==================== АВТОРИЗАЦИЯ ====================
            function saveAuth() {
                if (currentUser) {
                    localStorage.setItem(AUTH_KEY, JSON.stringify({
                        telegram_id: currentUser.telegram_id,
                        timestamp: Date.now()
                    }));
                }
            }

            function clearAuth() {
                localStorage.removeItem(AUTH_KEY);
                currentUser = null;
            }

            function loginAs(user) {
                currentUser = user;
                const du = DB.users.find(x => x.telegram_id === user.telegram_id);
                if (du) {
                    du.full_name = user.full_name;
                    du.username = user.username;
                    du.role = user.role;
                } else {
                    DB.users.push(user);
                }
                saveData();
                saveAuth();
                showMainApp();
                showToast('✅ Добро пожаловать, ' + user.full_name + '!', 'success');
            }

            function logout() {
                clearAuth();
                hideToolCard();
                showLoginScreen();
                showToast('Вы вышли из системы');
            }

            function showLoginScreen() {
                loginScreen.style.display = 'flex';
                mainScreen.style.display = 'none';
                mainScreen.classList.remove('active');
            }

            function showMainApp() {
                loginScreen.style.display = 'none';
                mainScreen.style.display = 'flex';
                mainScreen.classList.add('active');
                updateUserUI();
                updateTabsVisibility();
                switchTab('scan');
            }

            function updateUserUI() {
                if (!currentUser) return;
                $('#userName').textContent = currentUser.full_name;
                $('#userAvatar').textContent = currentUser.full_name.trim().charAt(0).toUpperCase() || '?';
                
                const roleEl = $('#userRole');
                if (currentUser.role === 'admin') {
                    roleEl.style.display = 'inline';
                    roleEl.textContent = 'Админ';
                    roleEl.style.background = '#fbbf24';
                    roleEl.style.color = '#000';
                } else if (currentUser.role === 'brigadier') {
                    roleEl.style.display = 'inline';
                    roleEl.textContent = 'Бригадир';
                    roleEl.style.background = '#a78bfa';
                    roleEl.style.color = '#fff';
                } else {
                    roleEl.style.display = 'none';
                }
            }

            function updateTabsVisibility() {
                if (!currentUser) return;
                const isAdminOrBrig = currentUser.role === 'admin' || currentUser.role === 'brigadier';
                $('#tabAdmin').style.display = isAdminOrBrig ? 'block' : 'none';
            }

            function authenticateViaTelegram() {
                if (typeof window.Telegram === 'undefined' || typeof window.Telegram.WebApp === 'undefined') {
                    showToast('❌ Откройте приложение через кнопку бота в Telegram', 'error');
                    return;
                }
                try {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
                        showToast('❌ Нет данных пользователя. Отправьте /start боту', 'error');
                        return;
                    }
                    const u = tg.initDataUnsafe.user;
                    const telegramId = u.id;
                    const username = u.username || ('user_' + telegramId);
                    const fullName = ((u.first_name || '') + ' ' + (u.last_name || '')).trim() || username;
                    
                    let dbUser = DB.users.find(x => x.telegram_id === telegramId);
                    if (dbUser) {
                        dbUser.full_name = fullName;
                        dbUser.username = username;
                        loginAs(dbUser);
                    } else {
                        loginAs({
                            telegram_id: telegramId,
                            username: username,
                            full_name: fullName,
                            role: 'user'
                        });
                    }
                } catch (e) {
                    console.error('Ошибка авторизации:', e);
                    showToast('❌ Ошибка: ' + e.message, 'error');
                }
            }

            // ==================== ИНСТРУМЕНТЫ ====================
            function searchTool() {
                const code = $('#manualInput').value.trim();
                if (!code) { showToast('Введите серийный номер', 'error'); return; }
                const tool = DB.tools.find(t => t.serial === code);
                if (!tool) { showToast('Инструмент не найден: ' + code, 'error');
                    hideToolCard(); return; }
                currentScannedTool = tool;
                showToolCard(tool);
            }

            function showToolCard(tool) {
                const card = $('#toolCard');
                card.style.display = 'block';
                $('#toolName').textContent = tool.name;
                $('#toolSerial').textContent = 'Серийный №: ' + tool.serial;
                
                const badge = $('#statusBadge');
                $('#btnTake').style.display = 'none';
                $('#btnReturn').style.display = 'none';
                $('#btnForceReturn').style.display = 'none';
                
                if (tool.status === 'available') {
                    badge.innerHTML = '<span style="color:#065f46;">✅ На складе</span>';
                    badge.style.background = '#d1fae5';
                    $('#btnTake').style.display = 'block';
                } else {
                    badge.innerHTML = '<span style="color:#991b1b;">❌ На руках</span>';
                    badge.style.background = '#fee2e2';
                    
                    if (tool.current_holder === currentUser.telegram_id) {
                        $('#btnReturn').style.display = 'block';
                    } else if (currentUser.role === 'admin' || currentUser.role === 'brigadier') {
                        $('#btnForceReturn').style.display = 'block';
                    }
                }
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            function hideToolCard() {
                $('#toolCard').style.display = 'none';
                currentScannedTool = null;
            }

            function takeTool() {
                if (!currentScannedTool || currentScannedTool.status !== 'available') return;
                currentScannedTool.status = 'taken';
                currentScannedTool.current_holder = currentUser.telegram_id;
                DB.transactions.push({
                    id: Date.now(),
                    tool_serial: currentScannedTool.serial,
                    user_id: currentUser.telegram_id,
                    action: 'take',
                    timestamp: new Date().toISOString()
                });
                saveData();
                showToast('✅ Инструмент взят!', 'success');
                showToolCard(currentScannedTool);
                renderHistory();
            }

            function returnTool() {
                if (!currentScannedTool || currentScannedTool.status !== 'taken' || 
                    currentScannedTool.current_holder !== currentUser.telegram_id) return;
                currentScannedTool.status = 'available';
                currentScannedTool.current_holder = null;
                DB.transactions.push({
                    id: Date.now(),
                    tool_serial: currentScannedTool.serial,
                    user_id: currentUser.telegram_id,
                    action: 'return',
                    timestamp: new Date().toISOString()
                });
                saveData();
                showToast('✅ Инструмент возвращен!', 'success');
                showToolCard(currentScannedTool);
                renderHistory();
            }

            function forceReturn() {
                if (!currentScannedTool || (currentUser.role !== 'admin' && currentUser.role !== 'brigadier')) return;
                currentScannedTool.status = 'available';
                currentScannedTool.current_holder = null;
                DB.transactions.push({
                    id: Date.now(),
                    tool_serial: currentScannedTool.serial,
                    user_id: currentUser.telegram_id,
                    action: 'return',
                    timestamp: new Date().toISOString(),
                    note: 'Принудительный возврат'
                });
                saveData();
                showToast('⚡ Принудительно возвращен!', 'success');
                showToolCard(currentScannedTool);
                renderHistory();
            }

            // ==================== ИСТОРИЯ ====================
            function renderHistory() {
                const transactions = DB.transactions.slice().reverse().slice(0, 30);
                const list = $('#historyList');
                
                if (transactions.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">📭 История пуста</div>';
                    return;
                }
                
                list.innerHTML = transactions.map(t => {
                    const tool = DB.tools.find(x => x.serial === t.tool_serial);
                    const user = DB.users.find(u => u.telegram_id === t.user_id);
                    const isTake = t.action === 'take';
                    return `
                        <div style="background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">
                            <div style="width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:${isTake?'#dbeafe':'#d1fae5'};">
                                ${isTake ? '🤚' : '✅'}
                            </div>
                            <div style="flex:1;">
                                <div style="font-weight:600;">${isTake?'Взял':'Вернул'}: ${tool?.name || t.tool_serial}</div>
                                <div style="font-size:13px;color:#94a3b8;">${user?.full_name || 'ID:'+t.user_id} · ${t.tool_serial}</div>
                                <div style="font-size:11px;color:#94a3b8;">${new Date(t.timestamp).toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // ==================== АДМИН-ПАНЕЛЬ ====================
            function renderAdminPanel() {
                const isAdminOrBrig = currentUser && (currentUser.role === 'admin' || currentUser.role === 'brigadier');
                if (!isAdminOrBrig) {
                    $('#adminContent').innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">🔒 Нет доступа</div>';
                    return;
                }
                
                let html = '<div style="margin-bottom:16px;"><button class="btn" style="display:inline;width:auto;padding:8px 16px;font-size:13px;margin-right:8px;" id="btnAddCategory">📁 Создать категорию</button></div>';
                
                // Категории и инструменты
                DB.categories.forEach(cat => {
                    const tools = DB.tools.filter(t => t.category_id === cat.id);
                    html += `
                        <div style="margin-bottom:16px;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;">
                            <div style="padding:14px 16px;background:#f8fafc;font-weight:700;display:flex;justify-content:space-between;">
                                <span>📁 ${cat.name}</span>
                                <span style="background:#e2e8f0;padding:2px 10px;border-radius:12px;font-size:12px;">${tools.length} инстр.</span>
                            </div>
                            <div style="padding:10px;">
                                ${tools.length === 0 ? '<div style="text-align:center;padding:20px;color:#94a3b8;">Нет инструментов</div>' : tools.map(t => `
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #f1f5f9;">
                                        <div>
                                            <div style="font-weight:600;">${t.name}</div>
                                            <div style="font-size:11px;color:#94a3b8;font-family:monospace;">${t.serial}</div>
                                        </div>
                                        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.status==='available'?'#10b981':'#ef4444'};"></span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                // Без категории
                const noCat = DB.tools.filter(t => !t.category_id);
                if (noCat.length > 0) {
                    html += `
                        <div style="margin-bottom:16px;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;">
                            <div style="padding:14px 16px;background:#f8fafc;font-weight:700;">📦 Без категории (${noCat.length})</div>
                            <div style="padding:10px;">
                                ${noCat.map(t => `
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #f1f5f9;">
                                        <div>
                                            <div style="font-weight:600;">${t.name}</div>
                                            <div style="font-size:11px;color:#94a3b8;font-family:monospace;">${t.serial}</div>
                                        </div>
                                        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.status==='available'?'#10b981':'#ef4444'};"></span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                
                $('#adminContent').innerHTML = html;
                
                // Обработчик кнопки создания категории
                const btnAddCat = $('#btnAddCategory');
                if (btnAddCat) {
                    btnAddCat.onclick = function() {
                        const name = prompt('Название категории:');
                        if (name && name.trim()) {
                            DB.categories.push({ id: 'cat_' + Date.now(), name: name.trim() });
                            saveData();
                            renderAdminPanel();
                            showToast('✅ Категория создана!', 'success');
                        }
                    };
                }
            }

            // ==================== НАВИГАЦИЯ ====================
            function switchTab(tabName) {
                $$('.screen').forEach(s => s.classList.remove('active'));
                $$('.tab').forEach(t => t.classList.remove('active'));
                
                const screen = $('#screen-' + tabName);
                const tab = document.querySelector(`.tab[data-tab="${tabName}"]`);
                
                if (screen) screen.classList.add('active');
                if (tab) tab.classList.add('active');
                
                if (tabName === 'history') renderHistory();
                if (tabName === 'admin') renderAdminPanel();
            }

            // ==================== ИНИЦИАЛИЗАЦИЯ ====================
            function init() {
                // Кнопки входа
                $('#btnLoginTelegram').onclick = function() {
                    console.log('Клик: Войти через Telegram');
                    authenticateViaTelegram();
                };
                
                $('#btnDevUser').onclick = function() {
                    console.log('Клик: Сотрудник');
                    loginAs({ telegram_id: 123456789, username: 'ivan_petrov', full_name: 'Иван Петров', role: 'user' });
                };
                
                $('#btnDevBrigadier').onclick = function() {
                    console.log('Клик: Бригадир');
                    loginAs({ telegram_id: 111222333, username: 'brigadier_user', full_name: 'Алексей Бригадиров', role: 'brigadier' });
                };
                
                $('#btnDevAdmin').onclick = function() {
                    console.log('Клик: Админ');
                    loginAs({ telegram_id: 987654321, username: 'admin_user', full_name: 'Сергей Админов', role: 'admin' });
                };
                
                // Выход
                $('#btnLogout').onclick = function() {
                    if (confirm('Выйти из системы?')) logout();
                };
                
                // Табы
                $$('.tab').forEach(tab => {
                    tab.onclick = function() {
                        switchTab(this.dataset.tab);
                    };
                });
                
                // Поиск инструмента
                $('#btnSearch').onclick = searchTool;
                $('#manualInput').onkeypress = function(e) {
                    if (e.key === 'Enter') searchTool();
                };
                
                // Действия с инструментами
                $('#btnTake').onclick = takeTool;
                $('#btnReturn').onclick = returnTool;
                $('#btnForceReturn').onclick = forceReturn;
                
                // Проверка сохраненной сессии
                const saved = localStorage.getItem(AUTH_KEY);
                if (saved) {
                    try {
                        const d = JSON.parse(saved);
                        const u = DB.users.find(x => x.telegram_id === d.telegram_id);
                        if (u) {
                            currentUser = u;
                            showMainApp();
                            console.log('Автовход: ' + u.full_name);
                            return;
                        }
                    } catch (e) {}
                }
                
                // Показываем экран входа
                showLoginScreen();
                console.log('ToolTracker v7.0 готов');
                console.log('Нажмите "Сотрудник", "Бригадир" или "Админ" для входа');
            }
            
            init();
        })();
    </script>
</body>
</html>
