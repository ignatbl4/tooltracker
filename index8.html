<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ToolTracker Pro | Учёт инструмента + QR сотрудника</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      min-height: 85vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      padding: 20px;
      color: white;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
    }
    .logout-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    .user-badge {
      background: rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      background: #2AABEE;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: #f1f5f9;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab.active {
      background: #2AABEE;
      color: white;
    }

    /* Screens */
    .screen {
      display: none;
      padding: 20px;
      flex: 1;
      overflow-y: auto;
      max-height: 70vh;
    }
    .screen.active {
      display: block;
    }

    /* Cards */
    .card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .tool-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      padding: 20px;
      text-align: center;
    }
    .tool-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .tool-serial {
      font-family: monospace;
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 12px;
    }
    .status-badge {
      display: inline-flex;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .status-available { background: #d1fae5; color: #065f46; }
    .status-taken { background: #fee2e2; color: #991b1b; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary { background: #2AABEE; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-outline { background: transparent; border: 2px solid #2AABEE; color: #2AABEE; }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .employee-list, .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .employee-item, .history-item {
      background: #f8fafc;
      padding: 12px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .qr-badge {
      font-family: monospace;
      background: #e2e8f0;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 11px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      z-index: 1000;
      transition: 0.3s;
      opacity: 0;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 400px;
      border-radius: 28px;
      padding: 24px;
    }

    .scanner-area {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      aspect-ratio: 1/1;
      position: relative;
    }
    #qr-reader { width: 100% !important; height: 100% !important; }
    #qr-reader video { object-fit: cover; }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .admin-table th, .admin-table td {
      padding: 10px 6px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    .small-btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div class="app-container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1>🔧 ToolTracker Pro</h1>
      <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    <div class="user-badge">
      <div class="user-avatar" id="userAvatar">👤</div>
      <span id="userName">Гость</span>
      <span id="roleBadge" style="font-size:11px; margin-left:6px;"></span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-screen="scan">📷 Сканер</button>
    <button class="tab" data-screen="history">📋 История</button>
    <button class="tab" data-screen="employees" id="employeesTab" style="display:none;">👥 Сотрудники</button>
    <button class="tab" data-screen="admin" id="adminTab" style="display:none;">⚙️ Админ</button>
  </div>

  <!-- Screen: Сканер -->
  <div class="screen active" id="screen-scan">
    <div class="scanner-area" id="scannerArea">
      <div id="qr-reader"></div>
    </div>
    <button class="btn btn-outline" id="stopScanBtn" style="display:none;">⏹ Остановить сканер</button>
    <div class="card">
      <input type="text" id="manualSerial" placeholder="Или введите серийный номер" maxlength="30">
      <button class="btn btn-primary" id="manualBtn">🔍 Найти инструмент</button>
    </div>
    <div id="toolInfo" style="display:none;" class="tool-card">
      <div class="tool-name" id="toolName"></div>
      <div class="tool-serial" id="toolSerial"></div>
      <div id="toolStatus" class="status-badge"></div>
      <div id="holderInfo"></div>
      <button id="takeBtn" class="btn btn-primary" style="display:none;">🤚 Взять инструмент</button>
      <button id="returnBtn" class="btn btn-success" style="display:none;">✅ Вернуть</button>
      <button id="forceReturnBtn" class="btn btn-danger" style="display:none;">⚡ Принудительный возврат</button>
    </div>
  </div>

  <!-- Screen: История -->
  <div class="screen" id="screen-history">
    <div id="historyList" class="history-list"></div>
  </div>

  <!-- Screen: Сотрудники (только админ) -->
  <div class="screen" id="screen-employees">
    <button class="btn btn-primary" id="addEmployeeBtn">➕ Добавить сотрудника</button>
    <div id="employeesList" class="employee-list" style="margin-top: 16px;"></div>
  </div>

  <!-- Screen: Админ панель -->
  <div class="screen" id="screen-admin">
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <button class="btn btn-outline" id="addCategoryBtn" style="margin:0;">📁 Категория</button>
      <button class="btn btn-primary" id="addToolBtn" style="margin:0;">➕ Инструмент</button>
    </div>
    <div id="adminContent"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- Modal: Добавить сотрудника -->
<div class="modal" id="employeeModal">
  <div class="modal-content">
    <h3 style="margin-bottom: 16px;">👥 Новый сотрудник</h3>
    <input type="text" id="empName" placeholder="Полное имя" autocomplete="off">
    <input type="number" id="empTelegramId" placeholder="Telegram ID (число)">
    <select id="empRole">
      <option value="user">Сотрудник</option>
      <option value="brigadier">Бригадир</option>
      <option value="admin">Администратор</option>
    </select>
    <button class="btn btn-primary" id="saveEmployeeBtn">Сохранить</button>
    <button class="btn btn-outline" id="closeEmployeeModal">Отмена</button>
  </div>
</div>

<!-- Modal: Добавить категорию -->
<div class="modal" id="categoryModal">
  <div class="modal-content">
    <h3>📁 Новая категория</h3>
    <input type="text" id="catName" placeholder="Название категории">
    <button class="btn btn-primary" id="saveCategoryBtn">Создать</button>
    <button class="btn btn-outline" id="closeCategoryModal">Отмена</button>
  </div>
</div>

<!-- Modal: Добавить инструмент -->
<div class="modal" id="toolModal">
  <div class="modal-content">
    <h3 id="toolModalTitle">➕ Добавить инструмент</h3>
    <select id="toolCategorySelect"></select>
    <input type="text" id="toolSerialInput" placeholder="Серийный номер (QR-код)">
    <input type="text" id="toolNameInput" placeholder="Название инструмента">
    <button class="btn btn-primary" id="saveToolBtn">Сохранить</button>
    <button class="btn btn-outline" id="closeToolModal">Отмена</button>
  </div>
</div>

<!-- Modal: Выдать инструмент по QR сотрудника -->
<div class="modal" id="qrEmployeeModal">
  <div class="modal-content">
    <h3>📷 Сканируйте QR сотрудника</h3>
    <div style="background:#000; border-radius:16px; overflow:hidden; margin-bottom:16px; aspect-ratio:1/1;">
      <div id="qr-employee-reader"></div>
    </div>
    <button class="btn btn-outline" id="closeQrModal">Отмена</button>
  </div>
</div>

<script>
  // ======================== БАЗА ДАННЫХ (localStorage) ========================
  const STORAGE_KEY = 'tooltracker_full_v5';
  let DB = {
    users: [
      { telegram_id: 987654321, full_name: 'Сергей Админов', role: 'admin', username: 'admin' },
      { telegram_id: 111222333, full_name: 'Алексей Бригадиров', role: 'brigadier', username: 'brigadier' },
      { telegram_id: 123456789, full_name: 'Иван Петров', role: 'user', username: 'ivan' }
    ],
    categories: [
      { id: 'cat1', name: 'Электроинструменты' },
      { id: 'cat2', name: 'Измерительные приборы' }
    ],
    tools: [
      { serial: 'SN-775533', name: 'Перфоратор Bosch GBH 2-28', category_id: 'cat1', status: 'available', current_holder: null },
      { serial: 'SN-992211', name: 'Шуруповерт Makita', category_id: 'cat1', status: 'available', current_holder: null },
      { serial: 'SN-448899', name: 'Лазерный нивелир', category_id: 'cat2', status: 'taken', current_holder: 123456789 }
    ],
    transactions: [
      { id: 1, tool_serial: 'SN-448899', user_id: 123456789, action: 'take', timestamp: new Date().toISOString() }
    ]
  };

  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed.users) DB = parsed;
      } catch(e) {}
    }
  }
  function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
  loadData();

  let currentUser = null;
  let currentTool = null;
  let qrScanner = null;
  let employeeQrScanner = null;
  let pendingToolForIssue = null; // для выдачи по QR сотрудника

  // DOM элементы
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);
  const toast = $('#toast');
  function showToast(msg, type='') {
    toast.textContent = msg;
    toast.className = 'toast show';
    if (type === 'error') toast.style.background = '#991b1b';
    else toast.style.background = '#1e293b';
    setTimeout(() => toast.classList.remove('show'), 2500);
    setTimeout(() => toast.style.background = '#1e293b', 2600);
  }

  // ======================== АВТОРИЗАЦИЯ ========================
  function login(user) {
    currentUser = user;
    $('#userName').innerText = user.full_name;
    $('#userAvatar').innerText = user.full_name.charAt(0).toUpperCase();
    const roleText = user.role === 'admin' ? 'Админ' : (user.role === 'brigadier' ? 'Бригадир' : 'Сотрудник');
    $('#roleBadge').innerText = roleText;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelector('.screen.active')?.classList.remove('active');
    $('#screen-scan').classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    $('.tab[data-screen="scan"]').classList.add('active');
    
    const isAdmin = user.role === 'admin';
    const isBrigadier = user.role === 'brigadier';
    $('#employeesTab').style.display = isAdmin ? 'block' : 'none';
    $('#adminTab').style.display = (isAdmin || isBrigadier) ? 'block' : 'none';
    
    renderHistory();
    if (isAdmin) renderEmployeesList();
    if (isAdmin || isBrigadier) renderAdminPanel();
    startMainScanner();
  }

  function logout() {
    if (confirm('Выйти из аккаунта?')) {
      currentUser = null;
      stopMainScanner();
      if (employeeQrScanner) employeeQrScanner.stop().catch(()=>{});
      $('#screen-scan').classList.add('active');
      $('#screen-history').classList.remove('active');
      $('#screen-employees').classList.remove('active');
      $('#screen-admin').classList.remove('active');
      $('#userName').innerText = 'Гость';
      $('#userAvatar').innerText = '👤';
      $('#roleBadge').innerText = '';
      $('#employeesTab').style.display = 'none';
      $('#adminTab').style.display = 'none';
      showToast('Вы вышли');
    }
  }

  // ======================== СКАНЕР ИНСТРУМЕНТА ========================
  async function startMainScanner() {
    const container = $('#qr-reader');
    if (!container) return;
    container.innerHTML = '';
    if (qrScanner && qrScanner.isScanning) await qrScanner.stop().catch(()=>{});
    qrScanner = new Html5Qrcode("qr-reader");
    try {
      await qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
        (decoded) => { processScannedSerial(decoded.trim()); },
        () => {}
      );
      $('#stopScanBtn').style.display = 'block';
    } catch(e) { console.log('Камера не доступна'); }
  }

  async function stopMainScanner() {
    if (qrScanner && qrScanner.isScanning) await qrScanner.stop().catch(()=>{});
    $('#stopScanBtn').style.display = 'none';
  }

  $('#stopScanBtn').addEventListener('click', () => stopMainScanner());

  function processScannedSerial(serial) {
    const tool = DB.tools.find(t => t.serial === serial);
    if (!tool) { showToast('❌ Инструмент не найден: ' + serial, 'error'); return; }
    showToolCard(tool);
  }

  function showToolCard(tool) {
    currentTool = tool;
    const cat = DB.categories.find(c => c.id === tool.category_id);
    $('#toolName').innerText = tool.name;
    $('#toolSerial').innerText = 'Серийный: ' + tool.serial;
    $('#toolCategory').innerText = cat ? cat.name : 'Без категории';
    const isAvailable = tool.status === 'available';
    $('#toolStatus').innerHTML = isAvailable ? '✅ На складе' : '❌ Выдан';
    $('#toolStatus').className = 'status-badge ' + (isAvailable ? 'status-available' : 'status-taken');
    
    const holder = tool.current_holder ? DB.users.find(u => u.telegram_id === tool.current_holder) : null;
    const isMy = holder && holder.telegram_id === currentUser.telegram_id;
    const canForce = (currentUser.role === 'admin' || currentUser.role === 'brigadier');
    
    $('#holderInfo').innerHTML = holder ? `<small>На руках: ${holder.full_name}</small>` : '';
    $('#takeBtn').style.display = (isAvailable && !holder) ? 'block' : 'none';
    $('#returnBtn').style.display = (isMy && tool.status === 'taken') ? 'block' : 'none';
    $('#forceReturnBtn').style.display = (canForce && tool.status === 'taken' && !isMy) ? 'block' : 'none';
    
    $('#toolInfo').style.display = 'block';
  }

  async function takeTool() {
    if (!currentTool || currentTool.status !== 'available') return;
    currentTool.status = 'taken';
    currentTool.current_holder = currentUser.telegram_id;
    DB.transactions.push({ id: Date.now(), tool_serial: currentTool.serial, user_id: currentUser.telegram_id, action: 'take', timestamp: new Date().toISOString() });
    saveData();
    showToast(`✅ ${currentTool.name} взят!`, 'success');
    showToolCard(currentTool);
    renderHistory();
    if (currentUser.role === 'admin' || currentUser.role === 'brigadier') renderAdminPanel();
  }

  async function returnTool() {
    if (!currentTool || currentTool.status !== 'taken' || currentTool.current_holder !== currentUser.telegram_id) return;
    currentTool.status = 'available';
    currentTool.current_holder = null;
    DB.transactions.push({ id: Date.now(), tool_serial: currentTool.serial, user_id: currentUser.telegram_id, action: 'return', timestamp: new Date().toISOString() });
    saveData();
    showToast(`✅ ${currentTool.name} возвращён!`, 'success');
    showToolCard(currentTool);
    renderHistory();
    if (currentUser.role === 'admin' || currentUser.role === 'brigadier') renderAdminPanel();
  }

  async function forceReturn() {
    if (!currentTool || currentTool.status !== 'taken') return;
    const oldHolder = currentTool.current_holder;
    currentTool.status = 'available';
    currentTool.current_holder = null;
    DB.transactions.push({ id: Date.now(), tool_serial: currentTool.serial, user_id: currentUser.telegram_id, action: 'return', timestamp: new Date().toISOString(), note: 'force' });
    saveData();
    showToast(`⚡ Принудительный возврат от ${oldHolder}`, 'success');
    showToolCard(currentTool);
    renderHistory();
    if (currentUser.role === 'admin' || currentUser.role === 'brigadier') renderAdminPanel();
  }

  // ======================== ВЫДАЧА ПО QR СОТРУДНИКА (АДМИН/БРИГАДИР) ========================
  function startEmployeeScannerForIssue(toolSerial) {
    pendingToolForIssue = toolSerial;
    const modal = $('#qrEmployeeModal');
    modal.classList.add('active');
    const container = $('#qr-employee-reader');
    container.innerHTML = '';
    if (employeeQrScanner && employeeQrScanner.isScanning) employeeQrScanner.stop().catch(()=>{});
    employeeQrScanner = new Html5Qrcode("qr-employee-reader");
    employeeQrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 },
      (decoded) => {
        // decoded — это Telegram ID сотрудника (QR должен содержать ID)
        const employeeId = parseInt(decoded);
        if (isNaN(employeeId)) { showToast('Неверный QR код сотрудника', 'error'); return; }
        const employee = DB.users.find(u => u.telegram_id === employeeId);
        if (!employee) { showToast('Сотрудник не найден', 'error'); return; }
        const tool = DB.tools.find(t => t.serial === pendingToolForIssue);
        if (!tool) { showToast('Инструмент не найден', 'error'); return; }
        if (tool.status !== 'available') { showToast('Инструмент уже выдан', 'error'); return; }
        tool.status = 'taken';
        tool.current_holder = employee.telegram_id;
        DB.transactions.push({ id: Date.now(), tool_serial: tool.serial, user_id: employee.telegram_id, action: 'take', timestamp: new Date().toISOString(), issued_by: currentUser.telegram_id });
        saveData();
        showToast(`✅ Выдано ${employee.full_name}: ${tool.name}`, 'success');
        closeQrModal();
        renderAdminPanel();
        renderHistory();
        if (currentTool && currentTool.serial === tool.serial) showToolCard(tool);
      },
      () => {}
    ).catch(e => showToast('Ошибка камеры', 'error'));
  }

  function closeQrModal() {
    if (employeeQrScanner && employeeQrScanner.isScanning) employeeQrScanner.stop().catch(()=>{});
    $('#qrEmployeeModal').classList.remove('active');
    pendingToolForIssue = null;
  }

  // ======================== АДМИН ПАНЕЛЬ ========================
  function renderAdminPanel() {
    const container = $('#adminContent');
    if (!container) return;
    let html = '';
    DB.categories.forEach(cat => {
      const tools = DB.tools.filter(t => t.category_id === cat.id);
      html += `<div class="card" style="margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>📁 ${cat.name}</strong>
          <span style="font-size:12px;">${tools.length} шт</span>
        </div>
        <div style="margin-top:8px;">`;
      tools.forEach(tool => {
        const holder = tool.current_holder ? DB.users.find(u => u.telegram_id === tool.current_holder) : null;
        html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#f1f5f9; padding:8px; border-radius:12px; margin-bottom:6px;">
          <div><strong>${tool.name}</strong><br><code style="font-size:10px;">${tool.serial}</code><br><span style="font-size:11px;">${tool.status === 'available' ? '✅ Склад' : `👤 ${holder?.full_name || 'Выдан'}`}</span></div>
          <div style="display:flex; gap:4px;">
            ${tool.status === 'available' ? `<button class="small-btn" style="background:#2AABEE; color:white;" data-issue="${tool.serial}">📷 Выдать</button>` : ''}
            ${(currentUser.role === 'admin' || currentUser.role === 'brigadier') && tool.status === 'taken' ? `<button class="small-btn" style="background:#ef4444; color:white;" data-force="${tool.serial}">↩ Вернуть</button>` : ''}
            <button class="small-btn" data-edit="${tool.serial}">✏️</button>
            <button class="small-btn" data-del="${tool.serial}">🗑</button>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    // Без категории
    const noCatTools = DB.tools.filter(t => !t.category_id);
    if (noCatTools.length) {
      html += `<div class="card"><strong>📁 Без категории</strong><div>`;
      noCatTools.forEach(tool => {
        const holder = tool.current_holder ? DB.users.find(u => u.telegram_id === tool.current_holder) : null;
        html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#f1f5f9; padding:8px; border-radius:12px; margin-bottom:6px;">
          <div><strong>${tool.name}</strong><br><code>${tool.serial}</code><br><span>${tool.status === 'available' ? '✅ Склад' : `👤 ${holder?.full_name}`}</span></div>
          <div>
            ${tool.status === 'available' ? `<button class="small-btn" data-issue="${tool.serial}">📷 Выдать</button>` : ''}
            ${tool.status === 'taken' ? `<button class="small-btn" data-force="${tool.serial}">↩ Вернуть</button>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }
    container.innerHTML = html;
    // Обработчики
    document.querySelectorAll('[data-issue]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const serial = btn.dataset.issue;
        startEmployeeScannerForIssue(serial);
      });
    });
    document.querySelectorAll('[data-force]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const serial = btn.dataset.force;
        const tool = DB.tools.find(t => t.serial === serial);
        if (tool && tool.status === 'taken') {
          tool.status = 'available';
          tool.current_holder = null;
          DB.transactions.push({ id: Date.now(), tool_serial: tool.serial, user_id: currentUser.telegram_id, action: 'return', timestamp: new Date().toISOString(), note: 'force' });
          saveData();
          showToast(`Возврат ${tool.name}`, 'success');
          renderAdminPanel();
          renderHistory();
          if (currentTool && currentTool.serial === serial) showToolCard(tool);
        }
      });
    });
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => openEditTool(btn.dataset.edit));
    });
    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Удалить инструмент?')) {
          DB.tools = DB.tools.filter(t => t.serial !== btn.dataset.del);
          saveData();
          renderAdminPanel();
          renderHistory();
        }
      });
    });
  }

  function openEditTool(serial) {
    const tool = DB.tools.find(t => t.serial === serial);
    if (!tool) return;
    $('#toolModalTitle').innerText = '✏️ Редактировать';
    $('#toolCategorySelect').innerHTML = '<option value="">Без категории</option>' + DB.categories.map(c => `<option value="${c.id}" ${c.id === tool.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
    $('#toolSerialInput').value = tool.serial;
    $('#toolNameInput').value = tool.name;
    $('#toolModal').classList.add('active');
    window.editTargetSerial = serial;
  }

  function saveTool() {
    const serial = $('#toolSerialInput').value.trim();
    const name = $('#toolNameInput').value.trim();
    const catId = $('#toolCategorySelect').value || null;
    if (!serial || !name) { showToast('Заполните поля', 'error'); return; }
    if (window.editTargetSerial) {
      const tool = DB.tools.find(t => t.serial === window.editTargetSerial);
      if (tool) {
        if (serial !== window.editTargetSerial && DB.tools.find(t => t.serial === serial)) { showToast('Серийный номер уже есть', 'error'); return; }
        tool.serial = serial;
        tool.name = name;
        tool.category_id = catId;
      }
    } else {
      if (DB.tools.find(t => t.serial === serial)) { showToast('Инструмент уже существует', 'error'); return; }
      DB.tools.push({ serial, name, category_id: catId, status: 'available', current_holder: null });
    }
    saveData();
    closeToolModal();
    renderAdminPanel();
    renderHistory();
    showToast('Сохранено', 'success');
  }

  function addCategory() { const name = $('#catName').value.trim(); if (!name) return; DB.categories.push({ id: 'cat_' + Date.now(), name }); saveData(); closeCategoryModal(); renderAdminPanel(); showToast('Категория создана', 'success'); }
  function addEmployee() {
    const name = $('#empName').value.trim();
    const tgId = parseInt($('#empTelegramId').value);
    const role = $('#empRole').value;
    if (!name || isNaN(tgId)) { showToast('Введите имя и Telegram ID', 'error'); return; }
    if (DB.users.find(u => u.telegram_id === tgId)) { showToast('Такой ID уже есть', 'error'); return; }
    DB.users.push({ telegram_id: tgId, full_name: name, role, username: name.toLowerCase().replace(/\s/g,'') });
    saveData();
    closeEmployeeModal();
    renderEmployeesList();
    showToast(`Сотрудник ${name} добавлен`, 'success');
  }

  function renderEmployeesList() {
    const container = $('#employeesList');
    if (!container) return;
    container.innerHTML = DB.users.map(u => `
      <div class="employee-item">
        <div><strong>${u.full_name}</strong><br><span class="qr-badge">ID: ${u.telegram_id}</span><br><span style="font-size:11px;">${u.role === 'admin' ? 'Админ' : u.role === 'brigadier' ? 'Бригадир' : 'Сотрудник'}</span></div>
        <div><code class="qr-badge">${u.telegram_id}</code><br><small>QR для выдачи</small></div>
      </div>
    `).join('');
  }

  function renderHistory() {
    let transactions = [...DB.transactions];
    if (currentUser.role === 'user') transactions = transactions.filter(t => t.user_id === currentUser.telegram_id);
    transactions.reverse();
    const container = $('#historyList');
    if (transactions.length === 0) { container.innerHTML = '<div class="empty-state">Пусто</div>'; return; }
    container.innerHTML = transactions.map(t => {
      const tool = DB.tools.find(tl => tl.serial === t.tool_serial);
      const user = DB.users.find(u => u.telegram_id === t.user_id);
      return `<div class="history-item"><div><strong>${t.action === 'take' ? '🤚 Взял' : '✅ Вернул'}</strong><br>${tool?.name || t.tool_serial}<br><small>${user?.full_name || t.user_id} · ${new Date(t.timestamp).toLocaleString()}</small></div></div>`;
    }).join('');
  }

  // Модалки
  function closeToolModal() { $('#toolModal').classList.remove('active'); window.editTargetSerial = null; }
  function closeCategoryModal() { $('#categoryModal').classList.remove('active'); }
  function closeEmployeeModal() { $('#employeeModal').classList.remove('active'); }

  // События
  $('#logoutBtn').addEventListener('click', logout);
  $('#manualBtn').addEventListener('click', () => { const val = $('#manualSerial').value.trim(); if (val) processScannedSerial(val); });
  $('#takeBtn').addEventListener('click', takeTool);
  $('#returnBtn').addEventListener('click', returnTool);
  $('#forceReturnBtn').addEventListener('click', forceReturn);
  $('#addEmployeeBtn').addEventListener('click', () => $('#employeeModal').classList.add('active'));
  $('#saveEmployeeBtn').addEventListener('click', addEmployee);
  $('#closeEmployeeModal').addEventListener('click', closeEmployeeModal);
  $('#addCategoryBtn').addEventListener('click', () => $('#categoryModal').classList.add('active'));
  $('#saveCategoryBtn').addEventListener('click', addCategory);
  $('#closeCategoryModal').addEventListener('click', closeCategoryModal);
  $('#addToolBtn').addEventListener('click', () => { $('#toolModalTitle').innerText = '➕ Добавить инструмент'; $('#toolSerialInput').value = ''; $('#toolNameInput').value = ''; $('#toolCategorySelect').innerHTML = '<option value="">Без категории</option>' + DB.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join(''); window.editTargetSerial = null; $('#toolModal').classList.add('active'); });
  $('#saveToolBtn').addEventListener('click', saveTool);
  $('#closeToolModal').addEventListener('click', closeToolModal);
  $('#closeQrModal').addEventListener('click', closeQrModal);
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const screen = tab.dataset.screen;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(`#screen-${screen}`).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (screen === 'scan') startMainScanner();
      else stopMainScanner();
      if (screen === 'history') renderHistory();
      if (screen === 'employees' && currentUser?.role === 'admin') renderEmployeesList();
      if (screen === 'admin' && (currentUser?.role === 'admin' || currentUser?.role === 'brigadier')) renderAdminPanel();
    });
  });

  // Демо вход (для теста)
  function demoAdmin() { login(DB.users.find(u => u.role === 'admin')); }
  function demoUser() { login(DB.users.find(u => u.role === 'user')); }
  // Если нет пользователя — показываем выбор
  if (!currentUser) {
    const demoDiv = document.createElement('div');
    demoDiv.style.padding = '20px';
    demoDiv.style.textAlign = 'center';
    demoDiv.innerHTML = `<div class="card"><h3>Добро пожаловать!</h3><button class="btn btn-primary" id="demoAdminBtn">🛡️ Войти как Админ</button><button class="btn btn-outline" id="demoUserBtn" style="margin-top:8px;">👤 Войти как Сотрудник</button></div>`;
    document.querySelector('.app-container').prepend(demoDiv);
    document.getElementById('demoAdminBtn')?.addEventListener('click', () => { demoDiv.remove(); login(DB.users.find(u => u.telegram_id === 987654321)); });
    document.getElementById('demoUserBtn')?.addEventListener('click', () => { demoDiv.remove(); login(DB.users.find(u => u.telegram_id === 123456789)); });
  } else {
    login(currentUser);
  }
</script>
</body>
</html>
