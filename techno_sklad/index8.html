<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Учёт инструментов</title>
<!-- html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js">
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #222; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; display: flex; flex-direction: column; }
.header { background: #1a1a2e; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.header .user { font-size: 14px; }
.header .role { font-size: 11px; opacity: 0.8; }
.header button { background: #e94560; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.content { flex: 1; padding: 16px; overflow-y: auto; }
.tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.tabs button { padding: 8px 14px; border: 1px solid #ccc; border-radius: 20px; background: #fff; cursor: pointer; font-size: 14px; }
.tabs button.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 12px; }
.card h3 { margin-bottom: 8px; }
.status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.status-in_stock { background: #d4edda; color: #155724; }
.status-taken { background: #f8d7da; color: #721c24; }
.btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.btn-green { background: #28a745; color: #fff; }
.btn-blue { background: #007bff; color: #fff; }
.btn-red { background: #dc3545; color: #fff; }
.btn-gray { background: #6c757d; color: #fff; }
.btn-sm { padding: 8px 16px; font-size: 14px; width: auto; display: inline-block; }
input, select { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 13px; color: #555; display: block; margin-bottom: 3px; }
.error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin: 8px 0; }
.success { background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; margin: 8px 0; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table th, table td { padding: 8px 6px; text-align: left; border-bottom: 1px solid #eee; }
table th { background: #f8f9fa; position: sticky; top: 0; }
.scroll-table { max-height: 400px; overflow-y: auto; }
.history-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
.history-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #dc3545; }
.dot-blue { background: #007bff; }
.dot-orange { background: #fd7e14; }
.hidden { display: none; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ============ БАЗА ДАННЫХ (localStorage) ============
const DB_KEY = 'tooltracker_db';

function getDB() {
  const raw = localStorage.getItem(DB_KEY);
  if (raw) return JSON.parse(raw);
  // Инициализация по умолчанию
  const defaultDB = {
    users: [
      { id: 'u1', login: 'admin', password: 'admin', fullName: 'Администратор', role: 'admin', personalArticle: 'ADMIN00001' },
      { id: 'u2', login: 'sergey', password: '123456', fullName: 'Сергей Докучаев', role: 'foreman', personalArticle: '7IRBHX0NJA' },
      { id: 'u3', login: 'zhanibek', password: '123456', fullName: 'Махамаджон Уулу Жанибек', role: 'employee', personalArticle: 'TFVPIBJU04' },
      { id: 'u4', login: 'petr', password: '123456', fullName: 'Петров Пётр', role: 'employee', personalArticle: 'USER000042' }
    ],
    instruments: [
      { id: 'i1', article: 'INSTR-0099', name: 'Перфоратор Bosch GBH 2-26', description: 'Мощный перфоратор', status: 'in_stock', currentHolderId: null },
      { id: 'i2', article: 'INSTR-0042', name: 'Шуруповёрт Makita DF333D', description: 'Аккумуляторный', status: 'taken', currentHolderId: 'u3' },
      { id: 'i3', article: 'INSTR-0018', name: 'УШМ DeWALT DWE4057', description: 'Болгарка 125мм', status: 'in_stock', currentHolderId: null }
    ],
    log: []
  };
  saveDB(defaultDB);
  return defaultDB;
}

function saveDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

// ============ ГЛОБАЛЬНОЕ СОСТОЯНИЕ ============
let currentUser = null;
let db = getDB();
let html5QrCode = null;

// ============ РЕНДЕРИНГ ============
const app = document.getElementById('app');

function render(html) {
  app.innerHTML = html;
  attachEvents();
}

function attachEvents() {
  // Обработчики назначаются через делегирование в основном render, но для удобства часть inline
}

// ============ ЭКРАНЫ ============

// --- Логин ---
function renderLogin(error = '') {
  render(`
    <div class="content" style="display:flex;flex-direction:column;justify-content:center;">
      <h2 style="text-align:center;margin-bottom:20px;">🔧 Учёт инструментов</h2>
      ${error ? `<div class="error">${error}</div>` : ''}
      <div class="card">
        <div class="form-group"><label>Логин</label><input id="loginInput" type="text" placeholder="Введите логин"></div>
        <div class="form-group"><label>Пароль</label><input id="passInput" type="password" placeholder="Введите пароль"></div>
        <button class="btn btn-blue" id="loginBtn">Войти</button>
      </div>
      <p style="text-align:center;font-size:12px;color:#888;margin-top:10px;">
        Тест: admin/admin, sergey/123456, zhanibek/123456
      </p>
    </div>
  `);
  document.getElementById('loginBtn').addEventListener('click', () => {
    const login = document.getElementById('loginInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    const user = db.users.find(u => u.login === login && u.password === pass);
    if (user) {
      currentUser = user;
      renderMain();
    } else {
      renderLogin('Неверный логин или пароль');
    }
  });
}

// --- Главный интерфейс ---
function renderMain(tab = 'scanner', message = '') {
  const role = currentUser.role;
  const tabs = [
    { id: 'scanner', label: '📷 Сканер', roles: ['employee','foreman','admin'] },
    { id: 'history', label: '📋 История', roles: ['employee','foreman','admin'] },
    { id: 'admin_instr', label: '🛠️ Инструменты', roles: ['admin'] },
    { id: 'admin_users', label: '👥 Пользователи', roles: ['admin'] },
    { id: 'admin_log', label: '📊 Журнал', roles: ['admin'] }
  ].filter(t => t.roles.includes(role));

  render(`
    <div class="header">
      <div><span class="user">${currentUser.fullName}</span><br><span class="role">${role === 'admin' ? 'Администратор' : role === 'foreman' ? 'Бригадир' : 'Сотрудник'}</span></div>
      <div>
        <button id="profileBtn">🔑 Пароль</button>
        <button id="logoutBtn">Выйти</button>
      </div>
    </div>
    <div class="tabs" style="padding:10px 16px 0;">
      ${tabs.map(t => `<button class="${tab===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}
    </div>
    <div class="content" id="tabContent">
      ${message ? `<div class="${message.includes('✅')?'success':'error'}">${message}</div>` : ''}
    </div>
  `);

  // Переключение вкладок
  document.querySelectorAll('.tabs button').forEach(btn => {
    btn.addEventListener('click', () => renderMain(btn.dataset.tab));
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    currentUser = null;
    if (html5QrCode) { html5QrCode.stop().catch(()=>{}); html5QrCode = null; }
    renderLogin();
  });
  document.getElementById('profileBtn').addEventListener('click', () => renderProfile());

  // Контент вкладки
  const content = document.getElementById('tabContent');
  switch(tab) {
    case 'scanner': renderScanner(content); break;
    case 'history': renderHistory(content); break;
    case 'admin_instr': renderAdminInstruments(content); break;
    case 'admin_users': renderAdminUsers(content); break;
    case 'admin_log': renderAdminLog(content); break;
  }
}

// --- Профиль / смена пароля ---
function renderProfile() {
  const content = document.getElementById('tabContent');
  content.innerHTML = `
    <div class="card">
      <h3>Смена пароля</h3>
      <div class="form-group"><label>Старый пароль</label><input id="oldPass" type="password"></div>
      <div class="form-group"><label>Новый пароль</label><input id="newPass1" type="password"></div>
      <div class="form-group"><label>Повторите новый</label><input id="newPass2" type="password"></div>
      <button class="btn btn-blue" id="changePassBtn">Сохранить</button>
      <button class="btn btn-gray" id="backFromProfileBtn">Назад</button>
      <div id="profileMsg"></div>
    </div>
  `;
  document.getElementById('changePassBtn').addEventListener('click', () => {
    const old = document.getElementById('oldPass').value;
    const n1 = document.getElementById('newPass1').value;
    const n2 = document.getElementById('newPass2').value;
    const msg = document.getElementById('profileMsg');
    if (old !== currentUser.password) { msg.innerHTML = '<div class="error">Неверный старый пароль</div>'; return; }
    if (n1.length < 4) { msg.innerHTML = '<div class="error">Пароль минимум 4 символа</div>'; return; }
    if (n1 !== n2) { msg.innerHTML = '<div class="error">Пароли не совпадают</div>'; return; }
    const user = db.users.find(u => u.id === currentUser.id);
    user.password = n1;
    currentUser.password = n1;
    saveDB(db);
    msg.innerHTML = '<div class="success">Пароль изменён ✅</div>';
  });
  document.getElementById('backFromProfileBtn').addEventListener('click', () => renderMain());
}

// --- Сканер ---
function renderScanner(container) {
  const isForeman = currentUser.role === 'foreman';
  container.innerHTML = `
    ${isForeman ? `
    <div style="margin-bottom:10px;display:flex;gap:8px;">
      <button id="modeSelf" class="btn-sm btn-blue" style="flex:1">👤 Взять себе</button>
      <button id="modeEmployee" class="btn-sm btn-gray" style="flex:1">👥 Выдать сотруднику</button>
    </div>
    <div id="foremanStep" style="font-size:13px;color:#555;margin-bottom:8px;">Режим: взять себе</div>
    ` : ''}
    <div id="reader"></div>
    <button class="btn btn-gray" id="manualInputBtn" style="margin-top:8px;">⌨️ Ввести артикул вручную</button>
    <div id="manualInputArea" class="hidden" style="margin-top:10px;">
      <input id="manualArticle" type="text" placeholder="INSTR-XXXX или артикул сотрудника">
      <button class="btn btn-blue btn-sm" id="submitManual">Найти</button>
    </div>
    <div id="scanResult"></div>
    <div id="scanMsg"></div>
  `;

  let foremanMode = 'self'; // 'self' | 'employee'
  let pendingEmployee = null;

  // HTML5 QR Scanner
  if (html5QrCode) { html5QrCode.stop().catch(()=>{}); }
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => handleQRScan(decodedText),
    () => {}
  ).catch(err => {
    document.getElementById('scanMsg').innerHTML = `<div class="error">Камера недоступна: ${err.message}. Используйте ручной ввод.</div>`;
  });

  function handleQRScan(code) {
    const msg = document.getElementById('scanMsg');
    msg.innerHTML = '';
    const result = document.getElementById('scanResult');

    if (isForeman && foremanMode === 'employee' && !pendingEmployee) {
      // Сначала сканируем сотрудника
      const emp = db.users.find(u => u.personalArticle === code && u.role === 'employee');
      if (!emp) {
        msg.innerHTML = '<div class="error">Сотрудник не найден. Попробуйте снова.</div>';
        return;
      }
      pendingEmployee = emp;
      document.getElementById('foremanStep').innerHTML = `👤 Сотрудник: <b>${emp.fullName}</b>. Теперь сканируйте инструмент.`;
      msg.innerHTML = '<div class="success">Сотрудник найден. Сканируйте инструмент.</div>';
      return;
    }

    // Ищем инструмент
    const instr = db.instruments.find(i => i.article === code);
    if (!instr) {
      msg.innerHTML = `<div class="error">Инструмент ${code} не найден.</div>`;
      return;
    }
    showInstrumentCard(instr, result, msg);
  }

  function showInstrumentCard(instr, container, msgEl) {
    const holder = instr.currentHolderId ? db.users.find(u => u.id === instr.currentHolderId) : null;
    const isHeldByMe = instr.currentHolderId === currentUser.id;
    const canForceReturn = currentUser.role === 'admin' && instr.status === 'taken';

    container.innerHTML = `
      <div class="card" style="margin-top:10px;">
        <h3>${instr.name}</h3>
        <p>Арт: <b>${instr.article}</b></p>
        <p>${instr.description || ''}</p>
        <span class="status-badge status-${instr.status}">${instr.status === 'in_stock' ? '🟢 На складе' : '🔴 На руках'}</span>
        ${holder ? `<p style="margin-top:8px;">Держатель: <b>${holder.fullName}</b></p>` : ''}

        ${instr.status === 'in_stock' && !pendingEmployee ? `
          <button class="btn btn-green" id="takeBtn">🟢 ВЗЯТЬ</button>
        ` : ''}
        ${instr.status === 'in_stock' && pendingEmployee ? `
          <button class="btn btn-green" id="issueBtn">🟢 ВЫДАТЬ сотруднику ${pendingEmployee.fullName}</button>
        ` : ''}
        ${isHeldByMe ? `
          <button class="btn btn-blue" id="returnBtn">🔵 ВЕРНУТЬ</button>
        ` : ''}
        ${canForceReturn ? `
          <button class="btn btn-red" id="forceReturnBtn">⚠️ ПРИНУДИТЕЛЬНЫЙ ВОЗВРАТ</button>
        ` : ''}
        ${instr.status === 'taken' && !isHeldByMe && !canForceReturn ? `
          <p style="color:#721c24;margin-top:10px;">Инструмент у ${holder?.fullName}. Обратитесь к администратору.</p>
        ` : ''}
        <button class="btn btn-gray btn-sm" id="closeCardBtn">Закрыть</button>
      </div>
    `;

    // Обработчики
    document.getElementById('closeCardBtn')?.addEventListener('click', () => {
      container.innerHTML = '';
      pendingEmployee = null;
      if (isForeman) document.getElementById('foremanStep').innerHTML = 'Режим: выдать сотруднику';
    });

    document.getElementById('takeBtn')?.addEventListener('click', () => {
      instr.status = 'taken';
      instr.currentHolderId = currentUser.id;
      db.log.push({ id: Date.now().toString(), instrumentId: instr.id, action: 'taken', initiatorId: currentUser.id, targetId: currentUser.id, timestamp: new Date().toISOString(), comment: '' });
      saveDB(db);
      msgEl.innerHTML = '<div class="success">✅ Инструмент взят!</div>';
      setTimeout(() => { container.innerHTML = ''; if (isForeman) document.getElementById('foremanStep').innerHTML = 'Режим: выдать сотруднику'; }, 1500);
    });

    document.getElementById('issueBtn')?.addEventListener('click', () => {
      instr.status = 'taken';
      instr.currentHolderId = pendingEmployee.id;
      db.log.push({ id: Date.now().toString(), instrumentId: instr.id, action: 'issued_by_foreman', initiatorId: currentUser.id, targetId: pendingEmployee.id, timestamp: new Date().toISOString(), comment: '' });
      saveDB(db);
      msgEl.innerHTML = `<div class="success">✅ Выдано сотруднику ${pendingEmployee.fullName}!</div>`;
      pendingEmployee = null;
      if (isForeman) document.getElementById('foremanStep').innerHTML = 'Режим: выдать сотруднику';
      setTimeout(() => { container.innerHTML = ''; }, 1500);
    });

    document.getElementById('returnBtn')?.addEventListener('click', () => {
      instr.status = 'in_stock';
      instr.currentHolderId = null;
      db.log.push({ id: Date.now().toString(), instrumentId: instr.id, action: 'returned', initiatorId: currentUser.id, targetId: currentUser.id, timestamp: new Date().toISOString(), comment: '' });
      saveDB(db);
      msgEl.innerHTML = '<div class="success">✅ Инструмент возвращён!</div>';
      setTimeout(() => { container.innerHTML = ''; }, 1500);
    });

    document.getElementById('forceReturnBtn')?.addEventListener('click', () => {
      const reason = prompt('Причина принудительного возврата:');
      if (!reason) return;
      const prevHolder = instr.currentHolderId;
      instr.status = 'in_stock';
      instr.currentHolderId = null;
      db.log.push({ id: Date.now().toString(), instrumentId: instr.id, action: 'force_returned', initiatorId: currentUser.id, targetId: prevHolder, timestamp: new Date().toISOString(), comment: reason });
      saveDB(db);
      msgEl.innerHTML = '<div class="success">✅ Принудительный возврат выполнен.</div>';
      setTimeout(() => { container.innerHTML = ''; }, 1500);
    });
  }

  // Режимы бригадира
  if (isForeman) {
    document.getElementById('modeSelf').addEventListener('click', () => {
      foremanMode = 'self';
      pendingEmployee = null;
      document.getElementById('foremanStep').innerHTML = 'Режим: взять себе';
      document.getElementById('modeSelf').className = 'btn-sm btn-blue';
      document.getElementById('modeEmployee').className = 'btn-sm btn-gray';
    });
    document.getElementById('modeEmployee').addEventListener('click', () => {
      foremanMode = 'employee';
      pendingEmployee = null;
      document.getElementById('foremanStep').innerHTML = 'Режим: выдать сотруднику. Сканируйте бейдж сотрудника.';
      document.getElementById('modeEmployee').className = 'btn-sm btn-blue';
      document.getElementById('modeSelf').className = 'btn-sm btn-gray';
    });
  }

  // Ручной ввод
  document.getElementById('manualInputBtn').addEventListener('click', () => {
    document.getElementById('manualInputArea').classList.toggle('hidden');
  });
  document.getElementById('submitManual').addEventListener('click', () => {
    const val = document.getElementById('manualArticle').value.trim();
    if (val) handleQRScan(val);
  });
}

// --- История ---
function renderHistory(container) {
  const myLog = db.log.filter(e => e.initiatorId === currentUser.id || (currentUser.role === 'foreman' && e.action === 'issued_by_foreman' && e.initiatorId === currentUser.id));
  const actionLabels = { taken: 'Взял', returned: 'Вернул', issued_by_foreman: 'Выдал', force_returned: 'Принуд. возврат' };
  const actionDots = { taken: 'dot-red', returned: 'dot-blue', issued_by_foreman: 'dot-orange', force_returned: 'dot-red' };

  container.innerHTML = `
    <h3>Моя история операций</h3>
    ${myLog.length === 0 ? '<p>Нет операций</p>' : ''}
    ${myLog.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(entry => {
      const instr = db.instruments.find(i => i.id === entry.instrumentId);
      const targetUser = db.users.find(u => u.id === entry.targetId);
      return `
        <div class="history-item">
          <div class="history-dot ${actionDots[entry.action] || 'dot-red'}"></div>
          <div style="flex:1">
            <b>${actionLabels[entry.action] || entry.action}</b> — ${instr?.article || '?'} ${instr?.name || 'Неизвестный инструмент'}
            ${entry.action === 'issued_by_foreman' ? `<br><small>Выдано: ${targetUser?.fullName || '?'}</small>` : ''}
            ${entry.comment ? `<br><small>Причина: ${entry.comment}</small>` : ''}
            <br><small>${new Date(entry.timestamp).toLocaleString()}</small>
          </div>
        </div>
      `;
    }).join('')}
  `;
}

// --- Админ: Инструменты ---
function renderAdminInstruments(container) {
  container.innerHTML = `
    <h3>Управление инструментами</h3>
    <button class="btn btn-green btn-sm" id="addInstrBtn">+ Добавить инструмент</button>
    <input type="text" placeholder="Поиск..." id="instrSearch" style="margin:8px 0;">
    <div class="scroll-table">
      <table id="instrTable">
        <thead><tr><th>Артикул</th><th>Название</th><th>Статус</th><th>У кого</th><th>Действия</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="instrForm" class="hidden card" style="margin-top:10px;"></div>
  `;

  function refreshTable(filter = '') {
    const tbody = document.querySelector('#instrTable tbody');
    const filtered = db.instruments.filter(i => i.article.includes(filter) || i.name.toLowerCase().includes(filter.toLowerCase()));
    tbody.innerHTML = filtered.map(i => {
      const holder = i.currentHolderId ? db.users.find(u => u.id === i.currentHolderId) : null;
      return `
        <tr>
          <td>${i.article}</td>
          <td>${i.name}</td>
          <td><span class="status-badge status-${i.status}">${i.status === 'in_stock' ? 'Склад' : 'На руках'}</span></td>
          <td>${holder?.fullName || '—'}</td>
          <td>
            <button class="btn-sm btn-gray editInstr" data-id="${i.id}">✏️</button>
            ${i.status === 'taken' ? `<button class="btn-sm btn-red forceRet" data-id="${i.id}">↩️</button>` : ''}
            <button class="btn-sm btn-red delInstr" data-id="${i.id}">🗑</button>
          </td>
        </tr>
      `;
    }).join('');

    // События
    tbody.querySelectorAll('.editInstr').forEach(b => b.addEventListener('click', () => showInstrForm(b.dataset.id)));
    tbody.querySelectorAll('.forceRet').forEach(b => b.addEventListener('click', () => {
      const instr = db.instruments.find(i => i.id === b.dataset.id);
      const reason = prompt('Причина возврата:');
      if (!reason) return;
      db.log.push({ id: Date.now().toString(), instrumentId: instr.id, action: 'force_returned', initiatorId: currentUser.id, targetId: instr.currentHolderId, timestamp: new Date().toISOString(), comment: reason });
      instr.status = 'in_stock'; instr.currentHolderId = null;
      saveDB(db);
      refreshTable(document.getElementById('instrSearch')?.value || '');
    }));
    tbody.querySelectorAll('.delInstr').forEach(b => b.addEventListener('click', () => {
      if (confirm('Удалить инструмент?')) {
        db.instruments = db.instruments.filter(i => i.id !== b.dataset.id);
        saveDB(db);
        refreshTable(document.getElementById('instrSearch')?.value || '');
      }
    }));
  }

  refreshTable();
  document.getElementById('instrSearch').addEventListener('input', e => refreshTable(e.target.value));
  document.getElementById('addInstrBtn').addEventListener('click', () => showInstrForm());

  function showInstrForm(id = null) {
    const instr = id ? db.instruments.find(i => i.id === id) : null;
    const form = document.getElementById('instrForm');
    form.classList.remove('hidden');
    form.innerHTML = `
      <h4>${id ? 'Редактировать' : 'Добавить'} инструмент</h4>
      <div class="form-group"><label>Артикул</label><input id="fArticle" value="${instr?.article || ''}" placeholder="INSTR-XXXX"></div>
      <div class="form-group"><label>Название</label><input id="fName" value="${instr?.name || ''}"></div>
      <div class="form-group"><label>Описание</label><input id="fDesc" value="${instr?.description || ''}"></div>
      <button class="btn btn-green" id="saveInstrBtn">Сохранить</button>
      <button class="btn btn-gray" id="cancelInstrBtn">Отмена</button>
    `;
    document.getElementById('saveInstrBtn').addEventListener('click', () => {
      const article = document.getElementById('fArticle').value.trim();
      const name = document.getElementById('fName').value.trim();
      if (!article || !name) { alert('Артикул и название обязательны'); return; }
      if (id) {
        Object.assign(instr, { article, name, description: document.getElementById('fDesc').value });
      } else {
        if (db.instruments.find(i => i.article === article)) { alert('Артикул уже существует'); return; }
        db.instruments.push({ id: 'i' + Date.now(), article, name, description: document.getElementById('fDesc').value, status: 'in_stock', currentHolderId: null });
      }
      saveDB(db);
      form.classList.add('hidden');
      refreshTable(document.getElementById('instrSearch')?.value || '');
    });
    document.getElementById('cancelInstrBtn').addEventListener('click', () => form.classList.add('hidden'));
  }
}

// --- Админ: Пользователи ---
function renderAdminUsers(container) {
  container.innerHTML = `
    <h3>Управление пользователями</h3>
    <button class="btn btn-green btn-sm" id="addUserBtn">+ Добавить пользователя</button>
    <div class="scroll-table" style="margin-top:10px;">
      <table>
        <thead><tr><th>ФИО</th><th>Логин</th><th>Роль</th><th>Артикул</th><th>Действия</th></tr></thead>
        <tbody id="usersTbody"></tbody>
      </table>
    </div>
    <div id="userForm" class="hidden card" style="margin-top:10px;"></div>
  `;

  function refreshUsers() {
    document.getElementById('usersTbody').innerHTML = db.users.map(u => `
      <tr>
        <td>${u.fullName}</td><td>${u.login}</td><td>${u.role}</td><td>${u.personalArticle}</td>
        <td>
          <button class="btn-sm btn-gray editUser" data-id="${u.id}">✏️</button>
          <button class="btn-sm btn-red delUser" data-id="${u.id}">🗑</button>
        </td>
      </tr>
    `).join('');
    document.querySelectorAll('.editUser').forEach(b => b.addEventListener('click', () => showUserForm(b.dataset.id)));
    document.querySelectorAll('.delUser').forEach(b => b.addEventListener('click', () => {
      if (confirm('Удалить пользователя?')) {
        db.users = db.users.filter(u => u.id !== b.dataset.id);
        saveDB(db);
        refreshUsers();
      }
    }));
  }

  refreshUsers();
  document.getElementById('addUserBtn').addEventListener('click', () => showUserForm());

  function showUserForm(id = null) {
    const user = id ? db.users.find(u => u.id === id) : null;
    const form = document.getElementById('userForm');
    form.classList.remove('hidden');
    form.innerHTML = `
      <h4>${id ? 'Редактировать' : 'Добавить'} пользователя</h4>
      <div class="form-group"><label>ФИО</label><input id="ufName" value="${user?.fullName || ''}"></div>
      <div class="form-group"><label>Логин</label><input id="ufLogin" value="${user?.login || ''}"></div>
      <div class="form-group"><label>Пароль</label><input id="ufPass" type="password" value="${user?.password || ''}"></div>
      <div class="form-group"><label>Роль</label><select id="ufRole"><option value="employee" ${user?.role==='employee'?'selected':''}>Сотрудник</option><option value="foreman" ${user?.role==='foreman'?'selected':''}>Бригадир</option><option value="admin" ${user?.role==='admin'?'selected':''}>Админ</option></select></div>
      <div class="form-group"><label>Артикул</label><input id="ufArticle" value="${user?.personalArticle || ''}"><button type="button" class="btn-sm btn-gray" id="genArticle">Сгенерировать</button></div>
      <button class="btn btn-green" id="saveUserBtn">Сохранить</button>
      <button class="btn btn-gray" id="cancelUserBtn">Отмена</button>
    `;
    document.getElementById('genArticle').addEventListener('click', () => {
      document.getElementById('ufArticle').value = Array.from({length:10}, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
    });
    document.getElementById('saveUserBtn').addEventListener('click', () => {
      const d = { fullName: document.getElementById('ufName').value, login: document.getElementById('ufLogin').value, password: document.getElementById('ufPass').value, role: document.getElementById('ufRole').value, personalArticle: document.getElementById('ufArticle').value };
      if (!d.fullName || !d.login || !d.password || !d.personalArticle) { alert('Все поля обязательны'); return; }
      if (id) {
        Object.assign(user, d);
      } else {
        if (db.users.find(u => u.login === d.login)) { alert('Логин занят'); return; }
        if (db.users.find(u => u.personalArticle === d.personalArticle)) { alert('Артикул занят'); return; }
        db.users.push({ id: 'u' + Date.now(), ...d });
      }
      saveDB(db);
      form.classList.add('hidden');
      refreshUsers();
    });
    document.getElementById('cancelUserBtn').addEventListener('click', () => form.classList.add('hidden'));
  }
}

// --- Админ: Журнал ---
function renderAdminLog(container) {
  container.innerHTML = `
    <h3>Полный журнал событий</h3>
    <button class="btn btn-blue btn-sm" id="exportCSV">📥 Выгрузить CSV</button>
    <div class="scroll-table" style="margin-top:10px;">
      <table>
        <thead><tr><th>Дата</th><th>Инструмент</th><th>Действие</th><th>Инициатор</th><th>Цель</th><th>Комментарий</th></tr></thead>
        <tbody id="logTbody"></tbody>
      </table>
    </div>
  `;

  const actions = { taken: 'Взял', returned: 'Вернул', issued_by_foreman: 'Выдал', force_returned: 'Принуд. возврат' };
  document.getElementById('logTbody').innerHTML = db.log.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(e => {
    const instr = db.instruments.find(i => i.id === e.instrumentId);
    const init = db.users.find(u => u.id === e.initiatorId);
    const target = db.users.find(u => u.id === e.targetId);
    return `<tr><td>${new Date(e.timestamp).toLocaleString()}</td><td>${instr?.article||'?'} ${instr?.name||''}</td><td>${actions[e.action]||e.action}</td><td>${init?.fullName||'?'}</td><td>${target?.fullName||'?'}</td><td>${e.comment||''}</td></tr>`;
  }).join('');

  document.getElementById('exportCSV').addEventListener('click', () => {
    const rows = [['Дата','Инструмент','Действие','Инициатор','Цель','Комментарий']];
    db.log.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).forEach(e => {
      const instr = db.instruments.find(i => i.id === e.instrumentId);
      rows.push([new Date(e.timestamp).toLocaleString(), instr?.article||'', actions[e.action]||e.action, db.users.find(u=>u.id===e.initiatorId)?.fullName||'', db.users.find(u=>u.id===e.targetId)?.fullName||'', e.comment||'']);
    });
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'journal.csv';
    a.click();
  });
}

renderLogin();
